<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed | Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { padding-top: 130px; background-color: #f3f4f6; }
        #navbar { transition: transform 0.3s ease-in-out; }
        .hide-nav { transform: translateY(-100%); }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .dropdown-content { display: none; }
        .show-dropdown { display: block; }
        
        /* Post Animation */
        .post-enter { animation: slideUpFade 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Progress Bar Animation */
        .progress-bar-stripes {
            background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
            animation: progress-stripes 1s linear infinite;
        }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }
    </style>
</head>
<body>

    <div id="uploadProgressContainer" class="fixed top-0 left-0 w-full h-1.5 bg-gray-200 z-[60] hidden">
        <div id="uploadProgressBar" class="h-full bg-blue-600 w-0 transition-all duration-300 progress-bar-stripes"></div>
    </div>

    <header id="navbar" class="fixed w-full top-0 z-50 shadow-md bg-white">
        <div class="flex justify-between items-center px-4 py-3 border-b border-gray-100">
            <img src="logo.png" alt="Logo" class="h-10 object-contain">
            <div class="relative">
                <div id="profileBtn" class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-blue-600 flex items-center justify-center text-white font-bold cursor-pointer shadow-md hover:scale-105 transition-transform">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div id="profileMenu" class="dropdown-content absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 origin-top-right transition-all">
                    <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-50 hover:text-blue-600"><i class="fa-solid fa-circle-user mr-2"></i> My Profile</a>
                    <hr class="my-1 border-gray-100">
                    <button id="logoutBtn" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</button>
                </div>
            </div>
        </div>
        
        <nav class="flex justify-around items-center bg-white px-2 py-1">
            <a href="index.html" class="flex-1 flex justify-center py-3 text-blue-600 text-2xl border-b-2 border-blue-600" title="Feed">
                <i class="fa-solid fa-house"></i>
            </a>
            <a href="requests.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl" title="Requests">
                <i class="fa-solid fa-user-plus"></i>
            </a>
            <a href="members.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl" title="Members">
                <i class="fa-solid fa-users"></i>
            </a>
            <a href="notifications.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl" title="Notifications">
                <i class="fa-solid fa-bell"></i>
            </a>
            <a href="admindashboard.html" id="adminTab" class="hidden flex-1 flex justify-center py-3 text-red-400 hover:text-red-600 transition-colors text-2xl" title="Admin Panel">
                <i class="fa-solid fa-shield-halved"></i>
            </a>
        </nav>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-10">
        
        <div class="bg-white rounded-xl shadow-md p-4 mb-6 border border-gray-100 transform transition-all hover:shadow-lg">
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold flex-shrink-0">
                    <i class="fa-solid fa-user"></i>
                </div>
                <textarea id="postContent" class="w-full bg-gray-50 hover:bg-gray-100 focus:bg-white rounded-xl p-3 outline-none resize-none transition-colors border border-transparent focus:border-blue-300" rows="3" placeholder="What's on your mind?"></textarea>
            </div>

            <div id="mediaPreviewContainer" class="hidden mt-3 relative rounded-xl overflow-hidden bg-black">
                <img id="imagePreview" class="w-full h-auto max-h-64 object-contain hidden">
                <video id="videoPreview" class="w-full h-auto max-h-64 object-contain hidden" controls></video>
                <button id="removeMediaBtn" class="absolute top-2 right-2 bg-gray-900/60 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-red-600 backdrop-blur-sm transition-colors"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div id="metaPreview" class="mt-3 flex flex-wrap gap-2 text-xs font-semibold"></div>

            <div class="flex justify-between items-center mt-3 border-t border-gray-100 pt-3">
                <div class="flex gap-4 text-gray-500 text-xl pl-2">
                    <input type="file" id="mediaUpload" accept="image/*,video/*" class="hidden">
                    <button onclick="document.getElementById('mediaUpload').click()" class="hover:text-green-500 hover:scale-110 transition-transform" title="Photo/Video"><i class="fa-solid fa-images"></i></button>
                    <button id="feelingBtn" class="hover:text-yellow-500 hover:scale-110 transition-transform" title="Feeling"><i class="fa-solid fa-face-smile-beam"></i></button>
                    <button id="locationBtn" class="hover:text-red-500 hover:scale-110 transition-transform" title="Location"><i class="fa-solid fa-location-dot"></i></button>
                    <button id="tagBtn" class="hover:text-blue-500 hover:scale-110 transition-transform" title="Tag Friends"><i class="fa-solid fa-user-tag"></i></button>
                </div>
                <button id="createPostBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 active:scale-95 transition-all flex items-center gap-2 shadow-md hover:shadow-lg">
                    <span id="btnText">Post</span>
                </button>
            </div>
        </div>

        <div id="feedContainer" class="space-y-6">
            <div class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i><p class="mt-3 font-medium">Loading Feed...</p></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDldf2DAiB9jNnnsVHuwbHYUXbY5kQfj1s",
            authDomain: "mysocialapp-27824.firebaseapp.com",
            projectId: "mysocialapp-27824",
            storageBucket: "mysocialapp-27824.firebasestorage.app", // Make sure this is correct in your Firebase console
            messagingSenderId: "774980218922",
            appId: "1:774980218922:web:24b832c42b16d42a025353"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentUserProfile = null;
        let isAdmin = false;

        // Meta Data Storage for current post
        let postMeta = { feeling: null, location: null, tags: null, file: null, fileType: null };

        // --- 1. Navbar Logic ---
        let lastScrollY = window.scrollY;
        window.addEventListener("scroll", () => {
            const navbar = document.getElementById("navbar");
            if (window.scrollY > lastScrollY && window.scrollY > 50) {
                navbar.classList.add("hide-nav");
            } else {
                navbar.classList.remove("hide-nav");
            }
            lastScrollY = window.scrollY;
        });

        document.getElementById('profileBtn').addEventListener('click', () => {
            document.getElementById('profileMenu').classList.toggle('show-dropdown');
        });

        // --- 2. Auth Check ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserProfile = userDoc.data();
                if (user.email === "sandusha@gmail.com") { 
                    isAdmin = true;
                    // Mobile fix: change from hidden to inline-block
                    const adminTab = document.getElementById('adminTab');
                    adminTab.classList.remove('hidden');
                    adminTab.classList.add('inline-block');
                }
                loadFeed();
            }
        });

        // --- 3. UI interactions for Meta Data ---
        function updateMetaPreview() {
            const preview = document.getElementById('metaPreview');
            preview.innerHTML = '';
            
            if (postMeta.feeling) {
                preview.innerHTML += `<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-md"><i class="fa-solid fa-face-smile mr-1"></i> Feeling ${postMeta.feeling}</span>`;
            }
            if (postMeta.location) {
                preview.innerHTML += `<span class="bg-red-100 text-red-800 px-2 py-1 rounded-md"><i class="fa-solid fa-location-dot mr-1"></i> At ${postMeta.location}</span>`;
            }
            if (postMeta.tags) {
                preview.innerHTML += `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded-md"><i class="fa-solid fa-user-tag mr-1"></i> With ${postMeta.tags}</span>`;
            }
        }

        document.getElementById('feelingBtn').addEventListener('click', async () => {
            const { value: feeling } = await Swal.fire({ title: 'How are you feeling?', input: 'text', inputPlaceholder: 'e.g. Happy, Excited, Sad...', confirmButtonColor: '#2563eb' });
            if (feeling) { postMeta.feeling = feeling; updateMetaPreview(); }
        });

        document.getElementById('locationBtn').addEventListener('click', async () => {
            const { value: loc } = await Swal.fire({ title: 'Where are you?', input: 'text', inputPlaceholder: 'e.g. Minuwangoda, Colombo...', confirmButtonColor: '#2563eb' });
            if (loc) { postMeta.location = loc; updateMetaPreview(); }
        });

        document.getElementById('tagBtn').addEventListener('click', async () => {
            const { value: tags } = await Swal.fire({ title: 'Tag Friends', input: 'text', inputPlaceholder: 'e.g. Rosee, Amaya...', confirmButtonColor: '#2563eb' });
            if (tags) { postMeta.tags = tags; updateMetaPreview(); }
        });

        // --- 4. Media Upload Preview ---
        document.getElementById('mediaUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Video length / size check (Warn if > 15MB)
            if (file.size > 15 * 1024 * 1024) {
                Swal.fire('Warning', 'File is quite large. Uploading might take a while on mobile networks.', 'warning');
            }

            postMeta.file = file;
            postMeta.fileType = file.type.startsWith('video/') ? 'video' : 'image';

            const url = URL.createObjectURL(file);
            const container = document.getElementById('mediaPreviewContainer');
            const img = document.getElementById('imagePreview');
            const vid = document.getElementById('videoPreview');

            container.classList.remove('hidden');
            if (postMeta.fileType === 'video') {
                img.classList.add('hidden');
                vid.classList.remove('hidden');
                vid.src = url;
            } else {
                vid.classList.add('hidden');
                img.classList.remove('hidden');
                img.src = url;
            }
        });

        document.getElementById('removeMediaBtn').addEventListener('click', () => {
            postMeta.file = null;
            postMeta.fileType = null;
            document.getElementById('mediaUpload').value = '';
            document.getElementById('mediaPreviewContainer').classList.add('hidden');
            document.getElementById('videoPreview').pause();
        });

        // --- 5. Submit Post with Progress ---
        document.getElementById('createPostBtn').addEventListener('click', async () => {
            const content = document.getElementById('postContent').value.trim();
            if (!content && !postMeta.file) {
                Swal.fire('Empty Post', 'Please write something or attach a photo/video.', 'info');
                return;
            }

            const btn = document.getElementById('createPostBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('postSpinner');
            
            btn.disabled = true;
            btnText.innerText = "Uploading...";
            spinner.classList.remove('hidden');

            try {
                let mediaUrl = null;

                // Handle Upload if file exists
                if (postMeta.file) {
                    const progressContainer = document.getElementById('uploadProgressContainer');
                    const progressBar = document.getElementById('uploadProgressBar');
                    progressContainer.classList.remove('hidden');

                    const storageRef = ref(storage, `posts/${currentUserProfile.uid}_${Date.now()}_${postMeta.file.name}`);
                    const uploadTask = uploadBytesResumable(storageRef, postMeta.file);

                    // Await the upload completion with a promise to track progress
                    await new Promise((resolve, reject) => {
                        uploadTask.on('state_changed', 
                            (snapshot) => {
                                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                                progressBar.style.width = progress + '%';
                            }, 
                            (error) => reject(error), 
                            async () => {
                                mediaUrl = await getDownloadURL(uploadTask.snapshot.ref);
                                resolve();
                            }
                        );
                    });

                    // Hide progress bar when done
                    setTimeout(() => { progressContainer.classList.add('hidden'); progressBar.style.width = '0%'; }, 1000);
                }

                // Save to Firestore
                await addDoc(collection(db, "posts"), {
                    authorId: currentUserProfile.uid,
                    authorName: currentUserProfile.name,
                    content: content,
                    mediaUrl: mediaUrl,
                    mediaType: postMeta.fileType,
                    feeling: postMeta.feeling,
                    location: postMeta.location,
                    tags: postMeta.tags,
                    createdAt: serverTimestamp(),
                    editHistory: [],
                    isArchived: false,
                    isPinned: false
                });

                // Reset UI
                document.getElementById('postContent').value = "";
                document.getElementById('removeMediaBtn').click(); // clears file
                postMeta = { feeling: null, location: null, tags: null, file: null, fileType: null };
                updateMetaPreview();

            } catch (error) {
                Swal.fire('Error', 'Failed to post: ' + error.message, 'error');
                document.getElementById('uploadProgressContainer').classList.add('hidden');
            } finally {
                btn.disabled = false;
                btnText.innerText = "Post";
                spinner.classList.add('hidden');
            }
        });

        // --- 6. Render Feed ---
        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const feedContainer = document.getElementById('feedContainer');
                feedContainer.innerHTML = '';
                
                let posts = [];
                snapshot.forEach((doc) => {
                    let p = doc.data();
                    p.id = doc.id;
                    if (!p.isArchived) posts.push(p);
                });

                posts.sort((a, b) => b.isPinned - a.isPinned);

                if (posts.length === 0) {
                    feedContainer.innerHTML = `<div class="text-center text-gray-500 py-10 font-medium">No posts yet. Be the first to post!</div>`;
                    return;
                }

                posts.forEach(post => {
                    const isOwner = post.authorId === currentUserProfile.uid;
                    const dateObj = post.createdAt ? post.createdAt.toDate() : new Date();
                    const timeString = dateObj.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    
                    // Meta text generation
                    let metaText = '';
                    if (post.feeling) metaText += ` is feeling <b>${post.feeling}</b>`;
                    if (post.tags) metaText += ` with <b>${post.tags}</b>`;
                    if (post.location) metaText += ` at <b>${post.location}</b>`;

                    // Media generation
                    let mediaHtml = '';
                    if (post.mediaUrl) {
                        if (post.mediaType === 'video') {
                            mediaHtml = `<video src="${post.mediaUrl}" controls class="w-full h-auto max-h-96 object-cover mt-3 bg-black"></video>`;
                        } else {
                            mediaHtml = `<img src="${post.mediaUrl}" alt="Post image" class="w-full h-auto max-h-96 object-cover mt-3 bg-gray-100">`;
                        }
                    }

                    const postEl = document.createElement('div');
                    // Add animation class `post-enter`
                    postEl.className = `post-enter bg-white rounded-xl shadow-sm border overflow-hidden ${post.isPinned ? 'border-blue-300 bg-blue-50/20' : 'border-gray-200'}`;
                    
                    postEl.innerHTML = `
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center font-bold text-blue-800 shadow-inner">
                                        ${post.authorName.charAt(0)}
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-gray-800 text-sm">
                                            ${post.authorName} <span class="font-normal text-gray-500">${metaText}</span>
                                            ${post.isPinned ? '<span class="ml-1 text-[10px] text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full uppercase tracking-wider"><i class="fa-solid fa-thumbtack"></i> Pinned</span>' : ''}
                                        </h3>
                                        <p class="text-xs text-gray-500 mt-0.5">${timeString} <i class="fa-solid fa-earth-americas ml-1 text-[10px]"></i></p>
                                    </div>
                                </div>
                                
                                ${(isOwner || isAdmin) ? `
                                <div class="relative">
                                    <button onclick="document.getElementById('menu-${post.id}').classList.toggle('hidden')" class="text-gray-400 hover:text-gray-800 p-2 rounded-full hover:bg-gray-100 transition"><i class="fa-solid fa-ellipsis"></i></button>
                                    <div id="menu-${post.id}" class="hidden absolute right-0 mt-1 w-36 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-10">
                                        ${isAdmin ? `<button onclick="window.togglePin('${post.id}', ${post.isPinned})" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"><i class="fa-solid fa-thumbtack mr-2 text-gray-400"></i> ${post.isPinned ? 'Unpin' : 'Pin Post'}</button>` : ''}
                                        ${isOwner ? `
                                        <button onclick="window.archivePost('${post.id}')" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"><i class="fa-solid fa-box-archive mr-2 text-gray-400"></i> Archive</button>
                                        <hr class="my-1 border-gray-100">
                                        <button onclick="window.deletePost('${post.id}')" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fa-solid fa-trash mr-2"></i> Delete</button>` : ''}
                                    </div>
                                </div>` : ''}
                            </div>

                            ${post.content ? `<div class="text-gray-800 text-sm whitespace-pre-wrap mt-2">${escapeHtml(post.content)}</div>` : ''}
                        </div>
                        
                        ${mediaHtml}

                        <div class="px-4 py-3 border-t border-gray-100 bg-gray-50/50 flex gap-6 text-gray-500 font-bold text-sm">
                            <button class="hover:text-blue-600 transition flex items-center gap-1.5"><i class="fa-regular fa-thumbs-up text-lg"></i> Like</button>
                            <button class="hover:text-blue-600 transition flex items-center gap-1.5"><i class="fa-regular fa-comment text-lg"></i> Comment</button>
                        </div>
                    `;
                    feedContainer.appendChild(postEl);
                });
            });
        }

        // Global functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        window.archivePost = async function(postId) {
            if(confirm("Archive this post?")) await updateDoc(doc(db, "posts", postId), { isArchived: true });
        };
        window.deletePost = async function(postId) {
            if(confirm("Permanently delete?")) await deleteDoc(doc(db, "posts", postId));
        };
        window.togglePin = async function(postId, currentStatus) {
            await updateDoc(doc(db, "posts", postId), { isPinned: !currentStatus });
        };

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });
    </script>
</body>
</html>
