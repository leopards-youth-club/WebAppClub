<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed | Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Anti-Copy & Select */
        body { padding-top: 60px; background-color: #f3f4f6; -webkit-user-select: none; user-select: none; }
        img { pointer-events: auto; } /* Allow clicking images for lightbox */
        
        #bottomNav { transition: transform 0.3s ease-in-out; }
        .hide-nav { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .dropdown-content { display: none; }
        .show-dropdown { display: block; }
        .post-enter { animation: slideUpFade 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        
        /* Reactions Hover effect */
        .reaction-box { display: none; }
        .reaction-btn-group:hover .reaction-box { display: flex; animation: slideUp 0.2s ease-out forwards;}
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .progress-bar-stripes { background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent); background-size: 1rem 1rem; animation: progress-stripes 1s linear infinite; }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }

        /* Comment box transition */
        .comments-section { display: none; }
        .show-comments { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden flex flex-col items-center justify-center backdrop-blur-sm transition-opacity">
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-3xl hover:text-red-500 z-[101]"><i class="fa-solid fa-times"></i></button>
        <img id="lightboxImg" class="max-w-full max-h-full object-contain p-2">
    </div>

    <div id="tagModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800">Tag Friends</h2>
                <button onclick="closeTagModal()" class="text-gray-400 hover:text-red-500 text-2xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div id="friendsListContainer" class="p-4 max-h-60 overflow-y-auto space-y-2">
                </div>
            <div class="p-4 border-t border-gray-100">
                <button onclick="saveTags()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-xl hover:bg-blue-700">Done</button>
            </div>
        </div>
    </div>

    <div id="uploadProgressContainer" class="fixed top-0 left-0 w-full h-1.5 bg-gray-200 z-[60] hidden">
        <div id="uploadProgressBar" class="h-full bg-blue-600 w-0 transition-all duration-300 progress-bar-stripes"></div>
    </div>

    <header class="fixed w-full top-0 z-50 shadow-sm flex flex-col">
        <div class="flex justify-between items-center px-4 py-3 bg-white z-50 border-b border-gray-100">
            <img src="logo.png" alt="Logo" class="h-10 object-contain cursor-pointer" onclick="window.loadFeed()">
            <div class="flex items-center gap-4">
                <a href="members.html?search=true" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition text-lg"><i class="fa-solid fa-magnifying-glass"></i></a>
                <div class="relative">
                    <img id="navProfilePic" src="https://ui-avatars.com/api/?name=User" class="w-10 h-10 rounded-full shadow-sm cursor-pointer object-cover border border-gray-200" onclick="document.getElementById('profileMenu').classList.toggle('show-dropdown')">
                    <div id="profileMenu" class="dropdown-content absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 origin-top-right transition-all">
                        <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-50 hover:text-blue-600"><i class="fa-solid fa-circle-user mr-2"></i> My Profile</a>
                        <hr class="my-1 border-gray-100">
                        <button id="logoutBtn" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</button>
                    </div>
                </div>
            </div>
        </div>
        <nav id="bottomNav" class="flex justify-around items-center bg-white px-2 py-1 shadow-md absolute w-full top-full -z-10">
            <button onclick="window.loadFeed()" class="flex-1 flex justify-center py-3 text-blue-600 text-2xl border-b-2 border-blue-600"><i class="fa-solid fa-house"></i></button>
            <a href="requests.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl"><i class="fa-solid fa-user-plus"></i></a>
            <a href="members.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl"><i class="fa-solid fa-users"></i></a>
            <a href="notifications.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl"><i class="fa-solid fa-bell"></i></a>
            <a href="admindashboard.html" id="adminTab" class="hidden flex-1 flex justify-center py-3 text-red-400 hover:text-red-600 transition-colors text-2xl"><i class="fa-solid fa-shield-halved"></i></a>
        </nav>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-10 mt-6">
        
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 border border-gray-100 transform transition-all hover:shadow-md">
            <div id="postInputSection">
                <div class="flex gap-3">
                    <img id="postBoxDp" src="https://ui-avatars.com/api/?name=User" class="w-10 h-10 rounded-full object-cover shadow-sm border border-gray-100 flex-shrink-0">
                    <textarea id="postContent" class="w-full bg-gray-50 hover:bg-gray-100 focus:bg-white rounded-xl p-3 outline-none resize-none transition-colors border border-transparent focus:border-blue-300" rows="3" placeholder="What's on your mind?"></textarea>
                </div>

                <div id="mediaPreviewContainer" class="hidden mt-3 relative rounded-xl overflow-hidden bg-black">
                    <img id="imagePreview" class="w-full h-auto max-h-64 object-contain hidden">
                    <video id="videoPreview" class="w-full h-auto max-h-64 object-contain hidden" controls></video>
                    <button id="removeMediaBtn" class="absolute top-2 right-2 bg-gray-900/60 text-white rounded-full w-8 h-8 hover:bg-red-600"><i class="fa-solid fa-times"></i></button>
                </div>
                
                <div id="metaPreview" class="mt-3 flex flex-wrap gap-2 text-xs font-semibold"></div>

                <div class="flex justify-between items-center mt-3 border-t border-gray-100 pt-3">
                    <div class="flex gap-4 text-gray-500 text-xl pl-2">
                        <input type="file" id="mediaUpload" accept="image/*,video/*" class="hidden">
                        <button onclick="document.getElementById('mediaUpload').click()" class="hover:text-green-500 transition-transform hover:scale-110" title="Photo/Video"><i class="fa-solid fa-images"></i></button>
                        <button id="feelingBtn" class="hover:text-yellow-500 transition-transform hover:scale-110" title="Feeling"><i class="fa-solid fa-face-smile-beam"></i></button>
                        <button id="locationBtn" class="hover:text-red-500 transition-transform hover:scale-110" title="Location"><i class="fa-solid fa-location-dot"></i></button>
                        <button onclick="openTagModal()" class="hover:text-blue-500 transition-transform hover:scale-110" title="Tag Friends"><i class="fa-solid fa-user-tag"></i></button>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <button id="privacyBtn" class="text-gray-500 hover:text-gray-800 text-lg transition-colors"><i id="currentPrivacyIcon" class="fa-solid fa-earth-americas"></i></button>
                            <div id="privacyMenu" class="hidden absolute bottom-full right-0 mb-3 bg-white shadow-xl rounded-full px-5 py-3 flex gap-6 border border-gray-100 z-10">
                                <button onclick="setPrivacy('public', 'fa-earth-americas')" class="text-3xl text-blue-600 hover:scale-110 transition-transform"><i class="fa-solid fa-earth-americas"></i></button>
                                <button onclick="setPrivacy('friends', 'fa-user-group')" class="text-3xl text-green-600 hover:scale-110 transition-transform"><i class="fa-solid fa-user-group"></i></button>
                                <button onclick="setPrivacy('onlyMe', 'fa-lock')" class="text-3xl text-gray-600 hover:scale-110 transition-transform"><i class="fa-solid fa-lock"></i></button>
                            </div>
                        </div>
                        <button id="createPostBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 active:scale-95 shadow-md">Post</button>
                    </div>
                </div>
            </div>
            <div id="uploadingState" class="hidden text-center py-6">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600"></i>
                <p class="mt-3 font-bold text-gray-600">Uploading your post...</p>
            </div>
        </div>

        <div id="feedContainer" class="space-y-6">
            <div class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i><p class="mt-3 font-medium">Loading Feed...</p></div>
        </div>
        
        <div class="text-center mt-6 mb-10">
            <button onclick="window.loadFeed()" class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded-full text-sm font-bold shadow-sm hover:bg-gray-50 transition"><i class="fa-solid fa-rotate-right mr-2"></i>Load New Posts</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, doc, getDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDldf2DAiB9jNnnsVHuwbHYUXbY5kQfj1s",
            authDomain: "mysocialapp-27824.firebaseapp.com",
            projectId: "mysocialapp-27824",
            storageBucket: "mysocialapp-27824.firebasestorage.app",
            messagingSenderId: "774980218922",
            appId: "1:774980218922:web:24b832c42b16d42a025353"
        };
        const CLOUD_NAME = "dt2y6gent"; 
        const UPLOAD_PRESET = "ml_default";

        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let currentUserProfile = null; let isAdmin = false;
        let postMeta = { feeling: null, location: null, tags: [], file: null, fileType: null };
        let selectedPrivacy = "public";

        // Toast Notification Config (Small bottom-center popups) 🌟
        const Toast = Swal.mixin({
            toast: true, position: 'bottom', showConfirmButton: false, timer: 2000,
            customClass: { popup: 'bg-gray-900 text-white rounded-full px-4 py-2 text-sm' }
        });

        // Screenshot Prevention (Keyboard shortcuts) 🌟
        document.addEventListener('keydown', (e) => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 's' || e.key === 'p' || e.key === 'c'))) {
                e.preventDefault(); Toast.fire({ icon: 'warning', title: 'Action blocked for security' });
            }
        });

        let lastScrollY = window.scrollY;
        window.addEventListener("scroll", () => {
            const bottomNav = document.getElementById("bottomNav");
            if (window.scrollY > lastScrollY && window.scrollY > 50) bottomNav.classList.add("hide-nav");
            else bottomNav.classList.remove("hide-nav");
            lastScrollY = window.scrollY;
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserProfile = userDoc.data();
                if (!currentUserProfile.friends) currentUserProfile.friends = [];
                
                // Set Profile Pics in UI 🌟
                let dp = currentUserProfile.dp || `https://ui-avatars.com/api/?name=${currentUserProfile.name}`;
                document.getElementById('navProfilePic').src = dp;
                document.getElementById('postBoxDp').src = dp;

                if (user.email === "sandusha@gmail.com") { isAdmin = true; document.getElementById('adminTab').classList.remove('hidden'); document.getElementById('adminTab').classList.add('flex'); }
                window.loadFeed(); 
            }
        });

        // Privacy Setup 🌟
        document.getElementById('privacyBtn').addEventListener('click', () => {
            document.getElementById('privacyMenu').classList.toggle('hidden');
        });
        window.setPrivacy = function(val, iconClass) {
            selectedPrivacy = val;
            document.getElementById('currentPrivacyIcon').className = `fa-solid ${iconClass}`;
            document.getElementById('privacyMenu').classList.add('hidden');
        };

        // Tag Friends Logic 🌟
        window.openTagModal = async function() {
            const container = document.getElementById('friendsListContainer');
            container.innerHTML = '<div class="text-center text-sm text-gray-500 py-4"><i class="fa-solid fa-spinner fa-spin"></i> Loading friends...</div>';
            document.getElementById('tagModal').classList.remove('hidden');
            document.getElementById('tagModal').classList.add('flex');

            if(currentUserProfile.friends.length === 0) {
                container.innerHTML = '<div class="text-center text-sm text-gray-500 py-4">No friends added yet.</div>'; return;
            }

            container.innerHTML = '';
            for (let fid of currentUserProfile.friends) {
                const fDoc = await getDoc(doc(db, "users", fid));
                if(fDoc.exists()) {
                    let f = fDoc.data();
                    let isChecked = postMeta.tags.includes(f.name) ? 'checked' : '';
                    container.innerHTML += `
                        <label class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer border border-transparent hover:border-gray-200">
                            <input type="checkbox" value="${f.name}" class="tag-checkbox w-4 h-4 text-blue-600 rounded focus:ring-blue-500" ${isChecked}>
                            <div class="flex-1 text-gray-800 font-medium text-sm">${f.name}</div>
                        </label>
                    `;
                }
            }
        }
        window.closeTagModal = () => { document.getElementById('tagModal').classList.add('hidden'); document.getElementById('tagModal').classList.remove('flex'); }
        window.saveTags = () => {
            const checkboxes = document.querySelectorAll('.tag-checkbox:checked');
            postMeta.tags = Array.from(checkboxes).map(cb => cb.value);
            updateMetaPreview(); closeTagModal();
        }

        // Image Compressor
        async function compressImage(file) {
            if (!file.type.startsWith('image/')) return file;
            return new Promise((resolve) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); let width = img.width; let height = img.height;
                        const MAX_WIDTH = 1280; if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob ? new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }) : file), 'image/jpeg', 0.75); 
                    };
                };
            });
        }

        function updateMetaPreview() {
            const preview = document.getElementById('metaPreview'); preview.innerHTML = '';
            if (postMeta.feeling) preview.innerHTML += `<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-md"><i class="fa-solid fa-face-smile mr-1"></i> Feeling ${postMeta.feeling}</span>`;
            if (postMeta.location) preview.innerHTML += `<span class="bg-red-100 text-red-800 px-2 py-1 rounded-md"><i class="fa-solid fa-location-dot mr-1"></i> At ${postMeta.location}</span>`;
            if (postMeta.tags.length > 0) preview.innerHTML += `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded-md"><i class="fa-solid fa-user-tag mr-1"></i> With ${postMeta.tags.length} friends</span>`;
        }

        document.getElementById('feelingBtn').addEventListener('click', async () => {
            const { value: feeling } = await Swal.fire({ title: 'How are you feeling?', input: 'text', confirmButtonColor: '#2563eb' });
            if (feeling) { postMeta.feeling = feeling; updateMetaPreview(); }
        });
        document.getElementById('locationBtn').addEventListener('click', async () => {
            const { value: loc } = await Swal.fire({ title: 'Where are you?', input: 'text', confirmButtonColor: '#2563eb' });
            if (loc) { postMeta.location = loc; updateMetaPreview(); }
        });

        document.getElementById('mediaUpload').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            postMeta.file = file; postMeta.fileType = file.type.startsWith('video/') ? 'video' : 'image';
            const url = URL.createObjectURL(file);
            const container = document.getElementById('mediaPreviewContainer');
            const img = document.getElementById('imagePreview'); const vid = document.getElementById('videoPreview');
            container.classList.remove('hidden');
            if (postMeta.fileType === 'video') { img.classList.add('hidden'); vid.classList.remove('hidden'); vid.src = url; } 
            else { vid.classList.add('hidden'); img.classList.remove('hidden'); img.src = url; }
        });

        document.getElementById('removeMediaBtn').addEventListener('click', () => {
            postMeta.file = null; postMeta.fileType = null; document.getElementById('mediaUpload').value = '';
            document.getElementById('mediaPreviewContainer').classList.add('hidden'); document.getElementById('videoPreview').pause();
        });

        // Create Post
        document.getElementById('createPostBtn').addEventListener('click', async () => {
            const content = document.getElementById('postContent').value.trim();
            if (!content && !postMeta.file) { Toast.fire({ icon: 'info', title: 'Please write something' }); return; }

            document.getElementById('postInputSection').classList.add('hidden');
            document.getElementById('uploadingState').classList.remove('hidden');

            try {
                let mediaUrl = null;
                if (postMeta.file) {
                    const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;
                    let fileToUpload = await compressImage(postMeta.file);
                    const fd = new FormData(); fd.append("file", fileToUpload); fd.append("upload_preset", UPLOAD_PRESET);

                    const progressContainer = document.getElementById('uploadProgressContainer'); const progressBar = document.getElementById('uploadProgressBar');
                    progressContainer.classList.remove('hidden');

                    await new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest(); xhr.open('POST', url, true);
                        xhr.upload.onprogress = (e) => { if (e.lengthComputable) progressBar.style.width = ((e.loaded / e.total) * 100) + '%'; };
                        xhr.onload = () => { if (xhr.status === 200) { mediaUrl = JSON.parse(xhr.responseText).secure_url; resolve(); } else reject(new Error("Cloudinary Error")); };
                        xhr.onerror = () => reject(new Error("Network Error")); xhr.send(fd);
                    });
                    setTimeout(() => { progressContainer.classList.add('hidden'); progressBar.style.width = '0%'; }, 1000);
                }

                await addDoc(collection(db, "posts"), {
                    authorId: currentUserProfile.uid,
                    authorName: currentUserProfile.name,
                    authorDp: currentUserProfile.dp || null,
                    content: content, mediaUrl: mediaUrl, mediaType: postMeta.fileType,
                    feeling: postMeta.feeling, location: postMeta.location, tags: postMeta.tags.join(', '),
                    privacy: selectedPrivacy,
                    createdAt: serverTimestamp(), isArchived: false, isPinned: false,
                    reactions: {} // { uid: 'like' }
                });

                document.getElementById('postContent').value = ""; document.getElementById('removeMediaBtn').click();
                postMeta = { feeling: null, location: null, tags: [], file: null, fileType: null }; updateMetaPreview();
                window.loadFeed();
            } catch (error) { Toast.fire({ icon: 'error', title: 'Upload Failed' }); document.getElementById('uploadProgressContainer').classList.add('hidden'); } 
            finally { document.getElementById('postInputSection').classList.remove('hidden'); document.getElementById('uploadingState').classList.add('hidden'); }
        });

        // Lightbox Logic 🌟
        window.openLightbox = function(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
        }
        window.closeLightbox = function() { document.getElementById('lightbox').classList.add('hidden'); document.getElementById('lightboxImg').src = ''; }

        // Load Feed
        window.loadFeed = async function() {
            const feedContainer = document.getElementById('feedContainer');
            feedContainer.innerHTML = `<div class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>`;

            try {
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                
                feedContainer.innerHTML = '';
                let posts = [];
                snapshot.forEach((doc) => {
                    let p = doc.data(); p.id = doc.id;
                    if (p.isArchived) return;
                    if (p.privacy === 'onlyMe' && p.authorId !== currentUserProfile.uid) return;
                    // Strict Friend Check
                    if (p.privacy === 'friends' && p.authorId !== currentUserProfile.uid && !currentUserProfile.friends.includes(p.authorId)) return;
                    posts.push(p);
                });

                posts.sort((a, b) => b.isPinned - a.isPinned);
                if (posts.length === 0) { feedContainer.innerHTML = `<div class="text-center text-gray-500 py-10">No posts yet.</div>`; return; }

                posts.forEach(post => {
                    const isOwner = post.authorId === currentUserProfile.uid;
                    const timeString = post.createdAt ? post.createdAt.toDate().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                    
                    let metaText = '';
                    if (post.feeling) metaText += ` is feeling <b>${post.feeling}</b>`;
                    if (post.tags) metaText += ` with <b>${post.tags}</b>`;
                    if (post.location) metaText += ` at <b>${post.location}</b>`;

                    let privacyIcon = '<i class="fa-solid fa-earth-americas" title="Public"></i>';
                    if (post.privacy === 'friends') privacyIcon = '<i class="fa-solid fa-user-group" title="Friends"></i>';
                    if (post.privacy === 'onlyMe') privacyIcon = '<i class="fa-solid fa-lock" title="Only Me"></i>';

                    // Profile Pic 🌟
                    let dpHtml = post.authorDp ? `<img src="${post.authorDp}" class="w-10 h-10 rounded-full object-cover">` : `<div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-800">${post.authorName.charAt(0)}</div>`;

                    let mediaHtml = '';
                    if (post.mediaUrl) {
                        if (post.mediaType === 'video') mediaHtml = `<video src="${post.mediaUrl}" controls class="w-full h-auto max-h-96 object-cover mt-3 bg-black cursor-pointer"></video>`;
                        else mediaHtml = `<img src="${post.mediaUrl}" onclick="openLightbox('${post.mediaUrl}')" class="w-full h-auto max-h-96 object-cover mt-3 bg-gray-100 cursor-pointer">`;
                    }

                    // My Reaction UI 🌟
                    let myReaction = (post.reactions && post.reactions[currentUserProfile.uid]) ? post.reactions[currentUserProfile.uid] : null;
                    let reactBtnHtml = `<button class="hover:text-blue-600 transition flex items-center gap-1.5"><i class="fa-regular fa-thumbs-up text-lg"></i> React</button>`;
                    if(myReaction === 'like') reactBtnHtml = `<button class="text-blue-600 font-bold flex items-center gap-1.5"><i class="fa-solid fa-thumbs-up text-lg"></i> Like</button>`;
                    if(myReaction === 'haha') reactBtnHtml = `<button class="text-yellow-500 font-bold flex items-center gap-1.5 text-lg">😂 Haha</button>`;
                    if(myReaction === 'sad') reactBtnHtml = `<button class="text-yellow-600 font-bold flex items-center gap-1.5 text-lg">😢 Sad</button>`;

                    const postEl = document.createElement('div');
                    postEl.className = `post-enter bg-white rounded-xl shadow-sm border overflow-hidden ${post.isPinned ? 'border-blue-300 bg-blue-50/20' : 'border-gray-200'}`;
                    
                    postEl.innerHTML = `
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-3">
                                    <a href="profile.html?uid=${post.authorId}">${dpHtml}</a>
                                    <div>
                                        <h3 class="font-bold text-gray-800 text-sm"><a href="profile.html?uid=${post.authorId}">${post.authorName}</a> <span class="font-normal text-gray-500">${metaText}</span>${post.isPinned ? '<span class="ml-2 text-[10px] text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full uppercase">Pinned</span>' : ''}</h3>
                                        <p class="text-xs text-gray-500 mt-0.5">${timeString} <span class="ml-1">${privacyIcon}</span></p>
                                    </div>
                                </div>
                                ${(isOwner || isAdmin) ? `
                                <div class="relative">
                                    <button onclick="document.getElementById('menu-${post.id}').classList.toggle('hidden')" class="text-gray-400 p-2"><i class="fa-solid fa-ellipsis"></i></button>
                                    <div id="menu-${post.id}" class="hidden absolute right-0 mt-1 w-36 bg-white shadow-xl border border-gray-100 py-2 z-10 rounded-xl">
                                        ${isAdmin ? `<button onclick="window.togglePin('${post.id}', ${post.isPinned}, '${post.authorId}')" class="block w-full text-left px-4 py-2 text-sm"><i class="fa-solid fa-thumbtack mr-2"></i> ${post.isPinned ? 'Unpin' : 'Pin'}</button>` : ''}
                                        ${isOwner ? `<button onclick="window.deletePost('${post.id}')" class="block w-full text-left px-4 py-2 text-sm text-red-600"><i class="fa-solid fa-trash mr-2"></i> Delete</button>` : ''}
                                    </div>
                                </div>` : ''}
                            </div>
                            ${post.content ? `<div class="text-gray-800 text-sm whitespace-pre-wrap mt-2">${escapeHtml(post.content)}</div>` : ''}
                        </div>
                        ${mediaHtml}
                        
                        <div class="px-4 py-3 border-t border-gray-100 bg-gray-50/50 flex gap-6 text-gray-500 font-bold text-sm">
                            <div class="reaction-btn-group relative">
                                ${reactBtnHtml}
                                <div class="reaction-box absolute bottom-full left-0 mb-2 bg-white shadow-xl rounded-full px-4 py-2 gap-4 border border-gray-100 z-10">
                                    <button onclick="window.reactPost('${post.id}', 'like', '${post.authorId}')" class="text-2xl hover:-translate-y-1 hover:scale-125 transition-transform">👍</button>
                                    <button onclick="window.reactPost('${post.id}', 'haha', '${post.authorId}')" class="text-2xl hover:-translate-y-1 hover:scale-125 transition-transform">😂</button>
                                    <button onclick="window.reactPost('${post.id}', 'sad', '${post.authorId}')" class="text-2xl hover:-translate-y-1 hover:scale-125 transition-transform">😢</button>
                                </div>
                            </div>
                            <button onclick="toggleComments('${post.id}')" class="hover:text-blue-600 transition flex items-center gap-1.5"><i class="fa-regular fa-comment text-lg"></i> Comment</button>
                        </div>
                        
                        <div id="comments-${post.id}" class="comments-section bg-gray-50 px-4 py-3 border-t border-gray-100">
                            <div class="flex gap-2 mb-4">
                                <img src="${currentUserProfile.dp || 'https://ui-avatars.com/api/?name=U'}" class="w-8 h-8 rounded-full">
                                <input type="text" id="commentInput-${post.id}" placeholder="Write a comment..." class="flex-1 bg-white border border-gray-200 rounded-full px-4 text-sm outline-none focus:border-blue-400">
                                <button onclick="addComment('${post.id}', '${post.authorId}')" class="text-blue-600 font-bold px-2"><i class="fa-solid fa-paper-plane"></i></button>
                            </div>
                            <div id="commentList-${post.id}" class="space-y-3 text-sm"></div>
                        </div>
                    `;
                    feedContainer.appendChild(postEl);
                });
            } catch (error) { console.error(error); feedContainer.innerHTML = `<div class="text-center text-red-500 py-10">Error loading feed.</div>`; }
        }

        // Live Reactions & Comments Logic 🌟
        window.reactPost = async function(postId, type, authorId) {
            try {
                // UI changes immediately via reload
                const postRef = doc(db, "posts", postId);
                await updateDoc(postRef, { [`reactions.${currentUserProfile.uid}`]: type });
                
                if(authorId !== currentUserProfile.uid) {
                    await addDoc(collection(db, "notifications"), {
                        receiverId: authorId, title: "New Reaction", desc: `${currentUserProfile.name} reacted to your post.`, link: "index.html", isRead: false, createdAt: serverTimestamp()
                    });
                }
                window.loadFeed(); // Reload to show reaction
            } catch(e) { Toast.fire({ icon: 'error', title: 'Failed to react' }); }
        };

        window.toggleComments = async function(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.classList.toggle('show-comments');
            if(section.classList.contains('show-comments')) {
                const list = document.getElementById(`commentList-${postId}`);
                list.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-gray-400"></i>`;
                const q = query(collection(db, `posts/${postId}/comments`), orderBy("createdAt", "asc"));
                const snap = await getDocs(q);
                list.innerHTML = '';
                if(snap.empty) { list.innerHTML = `<div class="text-xs text-gray-400">No comments yet.</div>`; return; }
                
                snap.forEach(docSnap => {
                    let c = docSnap.data();
                    list.innerHTML += `<div class="flex gap-2"><img src="${c.dp || 'https://ui-avatars.com/api/?name=U'}" class="w-8 h-8 rounded-full object-cover"><div class="bg-gray-200 rounded-2xl px-3 py-1.5"><span class="font-bold text-gray-800 text-xs mr-2">${c.name}</span><span class="text-gray-700">${escapeHtml(c.text)}</span></div></div>`;
                });
            }
        }

        window.addComment = async function(postId, authorId) {
            const input = document.getElementById(`commentInput-${postId}`);
            const text = input.value.trim();
            if(!text) return;
            
            input.value = '';
            try {
                await addDoc(collection(db, `posts/${postId}/comments`), {
                    uid: currentUserProfile.uid, name: currentUserProfile.name, dp: currentUserProfile.dp || null, text: text, createdAt: serverTimestamp()
                });
                
                if(authorId !== currentUserProfile.uid) {
                    await addDoc(collection(db, "notifications"), {
                        receiverId: authorId, title: "New Comment", desc: `${currentUserProfile.name} commented on your post.`, link: "index.html", isRead: false, createdAt: serverTimestamp()
                    });
                }
                
                // Refresh comments
                document.getElementById(`comments-${postId}`).classList.remove('show-comments');
                toggleComments(postId);
            } catch(e) { Toast.fire({ icon: 'error', title: 'Failed to comment' }); }
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.innerText = text; return div.innerHTML; }
        window.deletePost = async function(postId) { if(confirm("Permanently delete?")) { await deleteDoc(doc(db, "posts", postId)); window.loadFeed(); } };
        window.togglePin = async function(postId, currentStatus, authorId) { 
            await updateDoc(doc(db, "posts", postId), { isPinned: !currentStatus }); 
            if(!currentStatus && authorId !== currentUserProfile.uid) { // If pinning, notify author
                await addDoc(collection(db, "notifications"), { receiverId: authorId, title: "Post Pinned", desc: "Admin pinned your post.", link: "index.html", isRead: false, createdAt: serverTimestamp() });
            }
            window.loadFeed(); 
        };
        document.getElementById('logoutBtn').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = "login.html"; }); });
    </script>
</body>
</html>
