<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { padding-top: 60px; background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        #bottomNav { transition: transform 0.3s ease-in-out; }
        .hide-nav { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .cover-bg { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); }
        /* Modal Animation */
        .modal-enter { animation: fadeInScale 0.3s ease-out forwards; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="uploadProgressContainer" class="fixed top-0 left-0 w-full h-1.5 bg-gray-200 z-[60] hidden">
        <div id="uploadProgressBar" class="h-full bg-blue-600 w-0 transition-all duration-300"></div>
    </div>

    <header class="fixed w-full top-0 z-50 shadow-sm flex flex-col">
        <div class="flex justify-between items-center px-4 py-3 bg-white border-b border-gray-100">
            <img src="logo.png" alt="Logo" class="h-10 object-contain cursor-pointer" onclick="window.location.href='index.html'">
            <div class="flex items-center gap-4">
                <a href="members.html?search=true" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition text-lg"><i class="fa-solid fa-magnifying-glass"></i></a>
                <button id="logoutBtn" class="text-red-500 font-bold text-sm hover:underline">Logout</button>
            </div>
        </div>
        <nav id="bottomNav" class="flex justify-around items-center bg-white px-2 py-1 shadow-md absolute w-full top-full -z-10">
            <a href="index.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 text-2xl"><i class="fa-solid fa-house"></i></a>
            <a href="requests.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 text-2xl"><i class="fa-solid fa-user-plus"></i></a>
            <a href="members.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 text-2xl"><i class="fa-solid fa-users"></i></a>
            <a href="profile.html" class="flex-1 flex justify-center py-3 text-blue-600 text-2xl border-b-2 border-blue-600"><i class="fa-solid fa-user"></i></a>
        </nav>
    </header>

    <main class="max-w-3xl mx-auto pb-10">
        <div class="bg-white shadow-sm">
            <div id="coverPhoto" class="w-full h-48 md:h-64 cover-bg bg-cover bg-center relative group">
                <button id="editCoverBtn" class="hidden absolute top-4 right-4 bg-black/50 text-white p-2.5 rounded-full hover:bg-black/70 backdrop-blur-sm transition z-10" title="Edit Cover Photo">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            
            <div class="px-4 pb-6 relative max-w-2xl mx-auto">
                <div class="flex justify-between items-end -mt-16 mb-4">
                    <div class="relative group">
                        <img id="profilePic" src="https://ui-avatars.com/api/?name=User&background=random" class="w-32 h-32 rounded-full border-4 border-white shadow-md object-cover z-10 relative bg-white">
                        <button id="editDpBtn" class="hidden absolute bottom-0 right-0 bg-gray-800 text-white p-2 rounded-full border-2 border-white hover:bg-blue-600 transition z-20">
                            <i class="fa-solid fa-camera text-sm"></i>
                        </button>
                    </div>
                    
                    <div id="actionButtons" class="flex gap-2 mb-2">
                        </div>
                </div>

                <h1 id="userName" class="text-3xl font-bold text-gray-900">Loading...</h1>
                <p id="userBio" class="text-gray-600 mt-2 font-medium italic">"No bio added yet."</p>
                
                <div class="flex flex-wrap gap-4 mt-4 text-sm text-gray-500 font-medium bg-gray-50 p-3 rounded-lg border border-gray-100 inline-flex">
                    <span id="userCity"><i class="fa-solid fa-location-dot mr-1"></i> <span>Unknown</span></span>
                    <span id="userDob"><i class="fa-solid fa-cake-candles mr-1"></i> <span>Unknown</span></span>
                    <span id="userPhone" class="hidden text-blue-600"><i class="fa-solid fa-phone mr-1"></i> <span id="phoneText"></span></span>
                </div>
            </div>

            <div class="flex border-t border-gray-200 max-w-2xl mx-auto px-4">
                <button onclick="switchTab('posts')" id="tabPosts" class="flex-1 py-4 font-bold text-blue-600 border-b-4 border-blue-600 transition-colors">Timeline</button>
                <button onclick="switchTab('anon')" id="tabAnon" class="flex-1 py-4 font-bold text-gray-500 hover:text-blue-600 transition-colors">Secret Messages 🕵️‍♂️</button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto px-4 mt-6">
            
            <div id="postsTab" class="space-y-6">
                <div id="userPostsContainer" class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
            </div>

            <div id="anonTab" class="hidden space-y-4">
                <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl mb-6 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-indigo-800"><i class="fa-solid fa-user-secret mr-2"></i> Anonymous Inbox</h3>
                        <p class="text-xs text-indigo-600 mt-1">Honest feedback & secret messages.</p>
                    </div>
                    <button id="sendAnonBtnTop" class="hidden bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-indigo-700 transition">Send a Secret</button>
                </div>
                <div id="anonMessagesContainer" class="space-y-3">
                    <div class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
                </div>
            </div>

        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden modal-enter">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold text-gray-800">Edit Profile</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-red-500 text-2xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div><label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label><input type="text" id="editName" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 outline-none focus:border-blue-500"></div>
                <div><label class="block text-sm font-bold text-gray-700 mb-1">Bio / About me</label><textarea id="editBio" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 outline-none focus:border-blue-500" placeholder="A short description about yourself..."></textarea></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">Birthday</label><input type="date" id="editDob" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 outline-none focus:border-blue-500"></div>
                    <div><label class="block text-sm font-bold text-gray-700 mb-1">City</label><input type="text" id="editCity" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 outline-none focus:border-blue-500"></div>
                </div>
                <div><label class="block text-sm font-bold text-gray-700 mb-1">Phone Number <span class="text-xs text-gray-400 font-normal">(Visible to friends)</span></label><input type="tel" id="editPhone" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2.5 outline-none focus:border-blue-500" placeholder="07XXXXXXXX"></div>
                <button onclick="saveProfileSettings()" id="saveSettingsBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition mt-4 shadow-md">Save Changes</button>
            </div>
        </div>
    </div>

    <input type="file" id="coverUpload" accept="image/*" class="hidden">
    <input type="file" id="dpUpload" accept="image/*" class="hidden">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, addDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🛑 ඔයාගේ විස්තර දාන්න 🛑
        const firebaseConfig = {
            apiKey: "AIzaSyDldf2DAiB9jNnnsVHuwbHYUXbY5kQfj1s",
            authDomain: "mysocialapp-27824.firebaseapp.com",
            projectId: "mysocialapp-27824",
            storageBucket: "mysocialapp-27824.firebasestorage.app",
            messagingSenderId: "774980218922",
            appId: "1:774980218922:web:24b832c42b16d42a025353"
        };
        const CLOUD_NAME = "dt2y6gent"; 
        const UPLOAD_PRESET = "ml_default";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbytU7GJGMLGWElVVZdNwMVFKxxapgMsu0JwK90RkGoaVlswybYozkPFxwMRAeprtVjG/exec";

        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let currentUser = null;
        let viewedUser = null;
        const urlParams = new URLSearchParams(window.location.search);
        let targetUid = urlParams.get('uid');

        // Nav Scroll
        let lastScrollY = window.scrollY;
        window.addEventListener("scroll", () => {
            const bottomNav = document.getElementById("bottomNav");
            if (window.scrollY > lastScrollY && window.scrollY > 50) bottomNav.classList.add("hide-nav");
            else bottomNav.classList.remove("hide-nav");
            lastScrollY = window.scrollY;
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            if (!targetUid) targetUid = user.uid; // Url එකේ ID එකක් නැත්නම් තමන්ගේ එක පෙන්වයි

            const cuDoc = await getDoc(doc(db, "users", user.uid));
            currentUser = cuDoc.data();
            if (!currentUser.friends) currentUser.friends = [];

            loadProfileData();
        });

        async function loadProfileData() {
            try {
                const vpDoc = await getDoc(doc(db, "users", targetUid));
                if (!vpDoc.exists()) { Swal.fire('Error', 'User not found', 'error'); return; }
                viewedUser = vpDoc.data();
                
                const isOwner = currentUser.uid === targetUid;
                const isFriend = currentUser.friends.includes(targetUid);

                // UI Update
                document.getElementById('userName').innerText = viewedUser.name;
                document.getElementById('userCity').innerHTML = `<i class="fa-solid fa-location-dot mr-1"></i> ${viewedUser.city || 'Unknown'}`;
                document.getElementById('userDob').innerHTML = `<i class="fa-solid fa-cake-candles mr-1"></i> ${viewedUser.dob || 'Unknown'}`;
                
                if (viewedUser.bio) { document.getElementById('userBio').innerText = viewedUser.bio; document.getElementById('userBio').classList.remove('hidden'); }
                if (viewedUser.dp) document.getElementById('profilePic').src = viewedUser.dp;
                else document.getElementById('profilePic').src = `https://ui-avatars.com/api/?name=${viewedUser.name}&background=random`;
                if (viewedUser.cover) document.getElementById('coverPhoto').style.backgroundImage = `url(${viewedUser.cover})`;

                // Privacy: Show phone only to friends or owner
                if (viewedUser.phone && (isFriend || isOwner)) {
                    document.getElementById('userPhone').classList.remove('hidden');
                    document.getElementById('phoneText').innerText = viewedUser.phone;
                }

                // Action Buttons Setup
                const actionContainer = document.getElementById('actionButtons');
                if (isOwner) {
                    // Own Profile -> Settings Button
                    actionContainer.innerHTML = `<button onclick="window.openSettings()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-xl shadow-sm transition flex items-center gap-2"><i class="fa-solid fa-gear"></i> Settings</button>`;
                    document.getElementById('editCoverBtn').classList.remove('hidden');
                    document.getElementById('editDpBtn').classList.remove('hidden');
                } else {
                    // Friend's Profile -> Anonymous Message Button
                    document.getElementById('sendAnonBtnTop').classList.remove('hidden');
                    actionContainer.innerHTML = `<button onclick="window.switchTab('anon')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-xl shadow-md transition flex items-center gap-2"><i class="fa-solid fa-user-secret"></i> Send Secret</button>`;
                }

                loadPosts();
                loadAnonMessages(isOwner);

            } catch (error) { console.error(error); }
        }

        // Tabs
        window.switchTab = function(tabName) {
            document.getElementById('postsTab').classList.add('hidden');
            document.getElementById('anonTab').classList.add('hidden');
            document.getElementById('tabPosts').className = "flex-1 py-4 font-bold text-gray-500 hover:text-blue-600 transition-colors";
            document.getElementById('tabAnon').className = "flex-1 py-4 font-bold text-gray-500 hover:text-blue-600 transition-colors";
            
            if(tabName === 'posts') {
                document.getElementById('postsTab').classList.remove('hidden');
                document.getElementById('tabPosts').className = "flex-1 py-4 font-bold text-blue-600 border-b-4 border-blue-600 transition-colors";
            } else {
                document.getElementById('anonTab').classList.remove('hidden');
                document.getElementById('tabAnon').className = "flex-1 py-4 font-bold text-blue-600 border-b-4 border-blue-600 transition-colors";
            }
        }

        // Edit Profile Modal
        window.openSettings = function() {
            document.getElementById('editName').value = viewedUser.name || '';
            document.getElementById('editBio').value = viewedUser.bio || '';
            document.getElementById('editDob').value = viewedUser.dob || '';
            document.getElementById('editCity').value = viewedUser.city || '';
            document.getElementById('editPhone').value = viewedUser.phone || '';
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('settingsModal').classList.add('flex');
        }
        window.closeSettings = function() { document.getElementById('settingsModal').classList.add('hidden'); document.getElementById('settingsModal').classList.remove('flex'); }
        
        window.saveProfileSettings = async function() {
            const btn = document.getElementById('saveSettingsBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Saving...`; btn.disabled = true;
            try {
                await updateDoc(doc(db, "users", currentUser.uid), {
                    name: document.getElementById('editName').value,
                    bio: document.getElementById('editBio').value,
                    dob: document.getElementById('editDob').value,
                    city: document.getElementById('editCity').value,
                    phone: document.getElementById('editPhone').value
                });
                Swal.fire('Saved!', 'Profile updated.', 'success').then(() => location.reload());
            } catch(e) { Swal.fire('Error', e.message, 'error'); btn.innerHTML = `Save Changes`; btn.disabled = false; }
        }

        // Image Upload Logic (Cloudinary)
        async function uploadImage(file, fieldName) {
            const progress = document.getElementById('uploadProgressContainer');
            const bar = document.getElementById('uploadProgressBar');
            progress.classList.remove('hidden');

            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
            const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

            try {
                const response = await fetch(url, { method: 'POST', body: fd });
                const data = await response.json();
                await updateDoc(doc(db, "users", currentUser.uid), { [fieldName]: data.secure_url });
                location.reload();
            } catch (e) { Swal.fire('Upload Failed', '', 'error'); }
            progress.classList.add('hidden');
        }

        document.getElementById('editCoverBtn').addEventListener('click', () => document.getElementById('coverUpload').click());
        document.getElementById('editDpBtn').addEventListener('click', () => document.getElementById('dpUpload').click());
        document.getElementById('coverUpload').addEventListener('change', (e) => { if(e.target.files[0]) uploadImage(e.target.files[0], 'cover'); });
        document.getElementById('dpUpload').addEventListener('change', (e) => { if(e.target.files[0]) uploadImage(e.target.files[0], 'dp'); });


        // Anonymous Messages System
        document.getElementById('sendAnonBtnTop').addEventListener('click', async () => {
            const { value: text } = await Swal.fire({
                title: 'Secret Message 🕵️‍♂️',
                input: 'textarea',
                inputPlaceholder: 'Type something nice, funny, or honest...',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                confirmButtonText: 'Send Anonymously'
            });

            if (text) {
                // 1. Firebase එකට සේව් කිරීම (UI එකට)
                await addDoc(collection(db, "anon_messages"), {
                    receiverId: targetUid,
                    senderId: currentUser.uid, // We save it, but hide it in UI!
                    message: text,
                    createdAt: serverTimestamp()
                });

                // 2. Notification යැවීම
                await addDoc(collection(db, "notifications"), {
                    receiverId: targetUid,
                    title: "New Secret Message 🕵️‍♂️",
                    desc: "Someone sent you an anonymous message!",
                    link: "profile.html",
                    isRead: false,
                    createdAt: serverTimestamp()
                });

                // 3. Google Sheet එකට Secret එක යැවීම
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "logAnonMessage", senderName: currentUser.name, receiverName: viewedUser.name, message: text }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                Swal.fire('Sent!', 'Message delivered anonymously.', 'success');
                loadAnonMessages(false);
            }
        });

        async function loadAnonMessages(isOwner) {
            const container = document.getElementById('anonMessagesContainer');
            let q;
            
            if (isOwner) {
                // View all messages received
                q = query(collection(db, "anon_messages"), where("receiverId", "==", targetUid), orderBy("createdAt", "desc"));
            } else {
                // View only messages YOU sent to this person
                q = query(collection(db, "anon_messages"), where("receiverId", "==", targetUid), where("senderId", "==", currentUser.uid), orderBy("createdAt", "desc"));
            }

            const snapshot = await getDocs(q);
            container.innerHTML = '';

            if (snapshot.empty) {
                container.innerHTML = `<div class="text-center text-gray-400 py-10 italic">No secret messages yet.</div>`;
                return;
            }

            snapshot.forEach(docSnap => {
                const msg = docSnap.data();
                const d = msg.createdAt ? msg.createdAt.toDate().toLocaleDateString() : '';
                
                const box = document.createElement('div');
                // Different styling based on view
                if (isOwner) {
                    box.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex gap-4";
                    box.innerHTML = `<div class="text-3xl">🕵️‍♂️</div><div><h4 class="font-bold text-gray-800 text-sm">Anonymous</h4><p class="text-gray-600 mt-1">${msg.message}</p><p class="text-xs text-gray-400 mt-2">${d}</p></div>`;
                } else {
                    box.className = "bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex gap-4";
                    box.innerHTML = `<div class="text-3xl">🤫</div><div><h4 class="font-bold text-indigo-800 text-sm">You sent:</h4><p class="text-indigo-900 mt-1">${msg.message}</p><p class="text-xs text-indigo-400 mt-2">${d}</p></div>`;
                }
                container.appendChild(box);
            });
        }

        // Post loader placeholder (Requires similar logic to index.html but filtered by authorId === targetUid)
        async function loadPosts() {
            document.getElementById('userPostsContainer').innerHTML = `<div class="text-center text-gray-400 py-10">Posts loading coming soon...</div>`;
            // You can copy the loadFeed() logic from index.html here, just add `where("authorId", "==", targetUid)` to the query!
        }

        document.getElementById('logoutBtn').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = "login.html"; }); });
    </script>
</body>
</html>
