<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Requests | Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { padding-top: 130px; background-color: #f3f4f6; font-family: 'Inter', sans-serif; }
        #bottomNav { transition: transform 0.3s ease-in-out; }
        .hide-nav { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .dropdown-content { display: none; }
        .show-dropdown { display: block; }
        .card-enter { animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; transform: scale(0.9); }
        @keyframes zoomIn { to { opacity: 1; transform: scale(1); } }
        .card-leave { animation: slideOutRight 0.6s ease-in forwards; }
        @keyframes slideOutRight { 0% { transform: translateX(0); opacity: 1; } 50% { transform: translateX(-10px); opacity: 1; } 100% { transform: translateX(100%); opacity: 0; } }
        .btn-success { animation: pulseGreen 0.5s ease-out; background-color: #22c55e !important; color: white !important; }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body>

    <header class="fixed w-full top-0 z-50 shadow-sm flex flex-col">
        <div class="flex justify-between items-center px-4 py-3 bg-white z-50 border-b border-gray-100">
            <img src="logo.png" alt="Logo" class="h-10 object-contain cursor-pointer" onclick="window.location.href='index.html'">
            <div class="flex items-center gap-4">
                <a href="members.html?search=true" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition text-lg"><i class="fa-solid fa-magnifying-glass"></i></a>
                <div class="relative">
                    <div id="profileBtn" class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-blue-600 flex items-center justify-center text-white font-bold cursor-pointer shadow-md hover:scale-105 transition-transform"><i class="fa-solid fa-user"></i></div>
                    <div id="profileMenu" class="dropdown-content absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border border-gray-100 py-2 origin-top-right transition-all">
                        <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-50 hover:text-blue-600"><i class="fa-solid fa-circle-user mr-2"></i> My Profile</a>
                        <hr class="my-1 border-gray-100">
                        <button id="logoutBtn" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50"><i class="fa-solid fa-right-from-bracket mr-2"></i> Logout</button>
                    </div>
                </div>
            </div>
        </div>
        <nav id="bottomNav" class="flex justify-around items-center bg-white px-2 py-1 shadow-md absolute w-full top-full -z-10">
            <a href="index.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl" title="Feed"><i class="fa-solid fa-house"></i></a>
            <a href="requests.html" class="flex-1 flex justify-center py-3 text-blue-600 text-2xl border-b-2 border-blue-600" title="Requests"><i class="fa-solid fa-user-plus"></i></a>
            <a href="members.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl" title="Members"><i class="fa-solid fa-users"></i></a>
            <a href="notifications.html" class="flex-1 flex justify-center py-3 text-gray-400 hover:text-blue-600 transition-colors text-2xl" title="Notifications"><i class="fa-solid fa-bell"></i></a>
            <a href="admindashboard.html" id="adminTab" class="hidden flex-1 flex justify-center py-3 text-red-400 hover:text-red-600 transition-colors text-2xl" title="Admin Panel"><i class="fa-solid fa-shield-halved"></i></a>
        </nav>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-10 mt-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Friend Requests</h1>
            <span id="requestCount" class="bg-red-500 text-white text-xs font-bold px-2.5 py-1 rounded-full shadow-sm hidden">0 New</span>
        </div>
        <div id="requestsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i><p class="mt-3 font-medium">Checking requests...</p></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc, arrayUnion, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDldf2DAiB9jNnnsVHuwbHYUXbY5kQfj1s",
            authDomain: "mysocialapp-27824.firebaseapp.com",
            projectId: "mysocialapp-27824",
            storageBucket: "mysocialapp-27824.firebasestorage.app",
            messagingSenderId: "774980218922",
            appId: "1:774980218922:web:24b832c42b16d42a025353"
        };
        const CLOUD_NAME = "dt2y6gent"; 
        const UPLOAD_PRESET = "ml_default";

        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);
        let currentUserProfile = null;

        let lastScrollY = window.scrollY;
        window.addEventListener("scroll", () => {
            const bottomNav = document.getElementById("bottomNav");
            if (window.scrollY > lastScrollY && window.scrollY > 50) bottomNav.classList.add("hide-nav");
            else bottomNav.classList.remove("hide-nav");
            lastScrollY = window.scrollY;
        });

        document.getElementById('profileBtn').addEventListener('click', () => document.getElementById('profileMenu').classList.toggle('show-dropdown'));

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserProfile = userDoc.data();
                if (user.email === "sandusha@gmail.com") { document.getElementById('adminTab').classList.remove('hidden'); document.getElementById('adminTab').classList.add('flex'); }
                loadRequests();
            }
        });

        async function loadRequests() {
            const container = document.getElementById('requestsContainer'); const countBadge = document.getElementById('requestCount');
            
            try {
                const q = query(collection(db, "friendRequests"), where("receiverId", "==", currentUserProfile.uid), where("status", "==", "pending"));
                const snapshot = await getDocs(q);
                
                container.innerHTML = '';
                
                if (snapshot.empty) {
                    container.innerHTML = `<div class="col-span-full text-center py-16 bg-white rounded-xl shadow-sm border border-gray-100"><img src="https://cdn-icons-png.flaticon.com/512/657/657054.png" alt="No requests" class="w-24 h-24 mx-auto mb-4 opacity-50 grayscale"><h3 class="text-lg font-bold text-gray-700">No New Requests</h3><p class="text-sm text-gray-500 mt-1">When someone adds you, it will appear here.</p><button onclick="window.location.href='members.html'" class="mt-4 bg-blue-50 text-blue-600 px-5 py-2 rounded-full font-bold hover:bg-blue-100 transition">Find Friends</button></div>`;
                    countBadge.classList.add('hidden'); return;
                }

                countBadge.innerText = `${snapshot.size} New`; countBadge.classList.remove('hidden');

                // Load Requests & Fetch Sender Profile Pics 🌟
                for (const docSnap of snapshot.docs) {
                    const req = docSnap.data(); req.id = docSnap.id;
                    
                    const senderDocSnap = await getDoc(doc(db, "users", req.senderId));
                    const senderData = senderDocSnap.exists() ? senderDocSnap.data() : null;
                    
                    let dpHtml = (senderData && senderData.dp) 
                        ? `<img src="${senderData.dp}" class="w-12 h-12 rounded-full object-cover border border-gray-200 shadow-sm">` 
                        : `<div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center font-bold text-blue-800 text-lg shadow-inner">${req.senderName.charAt(0)}</div>`;

                    const card = document.createElement('div'); card.id = `req-card-${req.id}`; card.className = `card-enter bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition-shadow`;
                    card.innerHTML = `
                        <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='profile.html?uid=${req.senderId}'">
                            ${dpHtml}
                            <div><h3 class="font-bold text-gray-800 hover:text-blue-600">${req.senderName}</h3><p class="text-xs text-gray-500">Wants to be friends</p></div>
                        </div>
                        <button id="btn-${req.id}" onclick="window.acceptRequest('${req.id}', '${req.senderId}', '${req.senderName}')" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-blue-700 active:scale-95 transition-all shadow-md flex items-center gap-2">Confirm</button>
                    `;
                    container.appendChild(card);
                }
            } catch (error) { container.innerHTML = `<div class="col-span-full text-center text-red-500 py-10 font-medium">Error loading requests.</div>`; }
        }

        // Accept Request & Send Notification 🌟
        window.acceptRequest = async function(requestId, senderId, senderName) {
            const btn = document.getElementById(`btn-${requestId}`); const card = document.getElementById(`req-card-${requestId}`);
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Friends`; btn.className = `btn-success px-5 py-2 rounded-full font-bold text-sm transition-all shadow-lg flex items-center gap-2 pointer-events-none`;
            
            try {
                await updateDoc(doc(db, "friendRequests", requestId), { status: "accepted" });
                await updateDoc(doc(db, "users", currentUserProfile.uid), { friends: arrayUnion(senderId) });
                await updateDoc(doc(db, "users", senderId), { friends: arrayUnion(currentUserProfile.uid) });

                // Notify the sender that request was accepted
                await addDoc(collection(db, "notifications"), {
                    receiverId: senderId,
                    title: "Request Accepted",
                    desc: `${currentUserProfile.name} accepted your friend request.`,
                    link: `profile.html?uid=${currentUserProfile.uid}`,
                    isRead: false,
                    createdAt: serverTimestamp()
                });

                setTimeout(() => {
                    card.classList.add('card-leave');
                    setTimeout(() => {
                        card.remove();
                        if (document.getElementById('requestsContainer').children.length === 0) loadRequests();
                    }, 600);
                }, 1500);
            } catch (error) { Swal.fire('Error', 'Could not accept request', 'error'); btn.innerHTML = `Confirm`; btn.className = `bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-blue-700 active:scale-95 transition-all shadow-md flex items-center gap-2`; }
        };

        document.getElementById('logoutBtn').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = "login.html"; }); });
    </script>
</body>
</html>
